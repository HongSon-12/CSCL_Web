services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai_chatbot_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chatbot}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Ttcc^115}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_chatbot_backend
    restart: always
    env_file:
      - .env.example
      # Provides QUALITY_POSTGRES_* for QLCL Web external DB.
      - ../../.env.example
    environment:
      - APP_ENV=${APP_ENV:-development}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-chatbot}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-Ttcc^115}
      - HF_HOME=${HF_HOME:-/app/storage/models}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./storage:/app/storage
      - ./scripts:/app/scripts
      - ./tests:/app/tests
    depends_on:
      - postgres

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: ai_chatbot_worker
    restart: always
    env_file:
      - .env.example
    environment:
      - APP_ENV=${APP_ENV:-development}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-chatbot}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-Ttcc^115}
      - HF_HOME=${HF_HOME:-/app/storage/models}
    volumes:
      - ./backend:/app
      - ./storage:/app/storage
      - ./scripts:/app/scripts
      - ./tests:/app/tests
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai_chatbot_frontend
    restart: always
    environment:
      - BACKEND_INTERNAL_URL=http://backend:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

  nginx:
    image: nginx:stable-alpine
    container_name: ai_chatbot_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
