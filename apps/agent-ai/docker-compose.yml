services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai_chatbot_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_chatbot}
      POSTGRES_USER: ${POSTGRES_USER:-ai_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_chatbot_backend
    restart: always
    environment:
      - APP_ENV=${APP_ENV}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL}
      - HF_HOME=${HF_HOME:-/app/storage/models}
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
      - ./scripts:/app/scripts
    depends_on:
      - postgres

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: ai_chatbot_worker
    restart: always
    environment:
      - APP_ENV=${APP_ENV}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL}
      - HF_HOME=${HF_HOME:-/app/storage/models}
    volumes:
      - ./storage:/app/storage
      - ./scripts:/app/scripts
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai_chatbot_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:stable-alpine
    container_name: ai_chatbot_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
